name: osetrm-api-legal-entity
services:

  database:
    container_name: osetrm-api-legal-entity-db
    image: registry.access.redhat.com/rhel9/postgresql-16:latest
    restart: always
    environment:
      - POSTGRESQL_DATABASE=default
      - POSTGRESQL_USER=dbuser
      - POSTGRESQL_PASSWORD=Pass123!
    ports:
      - 5432:5432

  keycloak:
    container_name: osetrm-keycloak
    image: quay.io/keycloak/keycloak:latest
    command: 'start-dev --import-realm'
    restart: always
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=Pass123!
      #- KC_HOSTNAME=http://osetrm-keycloak:8080
    ports:
      - 8081:8080
    volumes:
      - ./src/test/resources:/opt/keycloak/data/import:z

  api:
    container_name: osetrm-api-legal-entity
    image: quay.io/osetrm/osetrm-api-legal-entity:latest
    restart: always
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://osetrm-api-legal-entity-db:5432/default?loggerLevel=OFF
      - QUARKUS_DATASOURCE_USERNAME=dbuser
      - QUARKUS_DATASOURCE_PASSWORD=Pass123!
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://osetrm-keycloak:8080/realms/osetrm-test
      - QUARKUS_OIDC_CLIENT_ID=osetrm-test-api
      - QUARKUS_OIDC_CREDENTIALS_SECRET=osetrm-test-api-secret
      - QUARKUS_LOG_LEVEL=DEBUG
    ports:
      - 8080:8080